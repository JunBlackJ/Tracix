name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            server/package-lock.json

      - name: Install app deps
        run: npm ci
        working-directory: app

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Type-check app
        run: npx tsc --noEmit
        working-directory: app

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: server

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tracix_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracix_test
      JWT_SECRET_CURRENT: test-secret-ci-only
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Push DB schema
        run: npx prisma db push --skip-generate
        working-directory: server

      - name: Run server tests
        run: npx vitest run
        working-directory: server

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            server/package-lock.json

      - name: Install app deps
        run: npm ci
        working-directory: app

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Build app
        run: npm run build
        working-directory: app

      - name: Build server
        run: npm run build
        working-directory: server
